<div
  class="project-card rounded-xl shadow-lg overflow-hidden card-hover cursor-pointer"
>
  <div class="relative h-48 overflow-hidden">
    <img
      [src]="project.image"
      [alt]="project.name"
      class="w-full h-full object-cover transition-transform duration-300 hover:scale-110"
    />
    <div class="absolute top-4 right-4">
      <span
        class="px-3 py-1 rounded-full text-xs font-semibold"
        [ngClass]="{
          'bg-green-100 text-green-800': project.status === 'active',
          'bg-blue-100 text-blue-800': project.status === 'planning',
          'bg-gray-100 text-gray-800': project.status === 'completed'
        }"
      >
        {{ project.status }}
      </span>
    </div>
    <div class="absolute bottom-4 left-4 right-4">
      <div class="glass-effect rounded-lg p-3">
        <div class="flex justify-between items-center text-white text-sm">
          <span>{{ project.sprints }} Sprints</span>
          <span>{{ project.stories }} Stories</span>
        </div>
      </div>
    </div>
  </div>

  <div class="p-6">
    <h3 class="text-xl font-semibold text-gray-900 mb-2">
      {{ project.name }}
    </h3>
    <p class="text-gray-600 text-sm mb-4 line-clamp-2">
      {{ project.description }}
    </p>

    <div class="space-y-3">
      <div class="flex justify-between items-center">
        <span class="text-sm text-gray-500">Progress</span>
        <span class="text-sm font-semibold text-gray-900"
          >{{ project.progress }}%</span
        >
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2">
        <div
          class="bg-teal-600 h-2 rounded-full transition-all duration-1000"
          [style.width.%]="project.progress"
        ></div>
      </div>

      <div class="flex justify-between items-center text-sm">
        <span class="text-gray-500">Team: {{ project.teamSize }}</span>
        <span class="text-gray-500"
          >Due: {{ project.deadline | date : 'MMM d, y' }}</span
        >
      </div>
    </div>

    <div class="mt-4 pt-4 border-t border-gray-200">
      <div class="flex space-x-2">
        <button
          class="flex-1 px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition-colors"
        >
          Edit
        </button>
        <button
          class="flex-1 px-3 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg text-sm font-medium transition-colors"
        >
          Sprints
        </button>
      </div>
    </div>
  </div>
</div>
