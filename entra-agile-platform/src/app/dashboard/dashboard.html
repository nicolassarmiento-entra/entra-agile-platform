<!-- Hero Section -->
<section class="hero-bg bg-cover bg-center relative h-96 flex items-center">
  <div class="absolute inset-0 bg-black bg-opacity-40"></div>
  <div
    class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center"
  >
    <h1
      class="text-5xl font-bold text-white mb-6 splitting-text"
      data-splitting
    >
      Streamline Your Agile Workflow
    </h1>
    <p class="text-xl text-gray-200 mb-8 max-w-3xl mx-auto">
      <span id="typed-text"></span>
    </p>
    <button
      (click)="openProjectModal()"
      class="bg-amber-400 hover:bg-amber-500 text-gray-900 px-8 py-4 rounded-lg font-semibold text-lg transition-all transform hover:scale-105"
    >
      Create Your First Project
    </button>
  </div>
</section>

<!-- Dashboard Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <!-- Stats Overview -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
    <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
      <div class="flex items-center">
        <div class="p-3 rounded-full bg-teal-100 text-teal-600">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"
            />
          </svg>
        </div>
        <div class="ml-4">
          <p class="text-sm font-medium text-gray-600">Active Projects</p>
          <p class="text-2xl font-semibold text-gray-900">6</p>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
      <div class="flex items-center">
        <div class="p-3 rounded-full bg-amber-100 text-amber-600">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
            <path
              fillRule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.414-1.414L11 9.586V6z"
              clipRule="evenodd"
            />
          </svg>
        </div>
        <div class="ml-4">
          <p class="text-sm font-medium text-gray-600">Active Sprints</p>
          <p class="text-2xl font-semibold text-gray-900">3</p>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
      <div class="flex items-center">
        <div class="p-3 rounded-full bg-green-100 text-green-600">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
            <path
              fillRule="evenodd"
              d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
              clipRule="evenodd"
            />
          </svg>
        </div>
        <div class="ml-4">
          <p class="text-sm font-medium text-gray-600">Completed Stories</p>
          <p class="text-2xl font-semibold text-gray-900">47</p>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-lg p-6 card-hover">
      <div class="flex items-center">
        <div class="p-3 rounded-full bg-red-100 text-red-600">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
            <path
              fillRule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clipRule="evenodd"
            />
          </svg>
        </div>
        <div class="ml-4">
          <p class="text-sm font-medium text-gray-600">Open Bugs</p>
          <p class="text-2xl font-semibold text-gray-900">12</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Projects Grid -->
  <div class="mb-8">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold text-gray-900">Your Projects</h2>
      <div class="flex space-x-4">
        <input
          type="text"
          id="projectSearch"
          placeholder="Search projects..."
          class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
        />
        <select
          id="projectFilter"
          class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
        >
          <option value="all">All Projects</option>
          <option value="active">Active</option>
          <option value="planning">Planning</option>
          <option value="completed">Completed</option>
        </select>
      </div>
    </div>

    <div
      id="projectsGrid"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
    >
      @for (project of projects(); track project.id) {
      <app-project-card [project]="project" />
      }
    </div>
  </div>

  <!-- Analytics Dashboard -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h3 class="text-xl font-semibold text-gray-900 mb-4">
        Sprint Velocity
      </h3>
      <div id="velocityChart" style="height: 300px"></div>
    </div>
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h3 class="text-xl font-semibold text-gray-900 mb-4">
        Project Progress
      </h3>
      <div id="progressChart" style="height: 300px"></div>
    </div>
  </div>
</main>

<app-project-modal
  [isVisible]="isProjectModalVisible"
  (closeModal)="closeProjectModal()"
/>
